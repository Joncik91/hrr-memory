<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="560">
      <stop offset="0%" stop-color="#f8f5ee"/>
      <stop offset="100%" stop-color="#f0ebe0"/>
    </linearGradient>
<marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1a6b6e"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8b3a2a"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#5a7a3a"/></marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="560" rx="12" fill="url(#bg)"/>
  <rect width="920" height="560" rx="12" fill="none" stroke="#d8cdb8"/>

  <!-- Title -->
  <text x="460" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1410">hrr-memory — Architecture</text>
  <text x="460" y="54" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#9a8e7a">store · query · ask · forget · auto-shard</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- ASK() — Natural Language Pipeline           -->
  <!-- ════════════════════════════════════════════ -->
  <text x="30" y="90" font-family="monospace" font-size="10" font-weight="700" fill="#9a8e7a" letter-spacing="2">ASK</text>

  <!-- Input question -->
  <g>
    <rect x="30" y="100" width="260" height="40" rx="6" fill="white" stroke="#d8cdb8"/>
    <text x="160" y="125" text-anchor="middle" font-family="monospace" font-size="12" fill="#5a4e3a">"What is alice's timezone?"</text>
  </g>

  <line x1="290" y1="120" x2="318" y2="120" stroke="#1a6b6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Strip stop words -->
  <g>
    <rect x="325" y="100" width="155" height="40" rx="6" fill="#1a6b6e" fill-opacity="0.06" stroke="#1a6b6e" stroke-dasharray="4,3"/>
    <text x="402" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a6b6e" font-weight="700">strip stops + possessives</text>
    <text x="402" y="131" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a6b6e">[ alice, timezone ]</text>
  </g>

  <line x1="480" y1="120" x2="508" y2="120" stroke="#1a6b6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Try pairs -->
  <g>
    <rect x="515" y="100" width="160" height="40" rx="6" fill="#1a6b6e" fill-opacity="0.06" stroke="#1a6b6e" stroke-dasharray="4,3"/>
    <text x="595" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a6b6e" font-weight="700">try word pairs</text>
    <text x="595" y="131" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a6b6e">query(alice, timezone)</text>
  </g>

  <line x1="675" y1="120" x2="708" y2="120" stroke="#8b3a2a" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- Result -->
  <g>
    <rect x="715" y="100" width="175" height="40" rx="6" fill="#8b3a2a" fill-opacity="0.07" stroke="#8b3a2a"/>
    <text x="802" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b3a2a">{ type: "direct" }</text>
    <text x="802" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#8b3a2a">match: "cet"</text>
  </g>

  <!-- Cascade note -->
  <text x="595" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#9a8e7a">cascade: word pairs → subject lookup → cross-bucket search → miss</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- STORE — Encoding Pipeline                    -->
  <!-- ════════════════════════════════════════════ -->
  <text x="30" y="195" font-family="monospace" font-size="10" font-weight="700" fill="#9a8e7a" letter-spacing="2">STORE</text>

  <!-- Triple -->
  <g>
    <rect x="30" y="208" width="100" height="44" rx="6" fill="white" stroke="#1a6b6e"/>
    <text x="80" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">subject</text>
    <text x="80" y="242" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1a6b6e">alice</text>
  </g>

  <text x="140" y="235" text-anchor="middle" font-family="monospace" font-size="16" fill="#1a6b6e" font-weight="700">⊛</text>

  <g>
    <rect x="155" y="208" width="100" height="44" rx="6" fill="white" stroke="#9a7a3a"/>
    <text x="205" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">relation</text>
    <text x="205" y="242" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#9a7a3a">lives_in</text>
  </g>

  <text x="265" y="235" text-anchor="middle" font-family="monospace" font-size="16" fill="#1a6b6e" font-weight="700">⊛</text>

  <g>
    <rect x="280" y="208" width="100" height="44" rx="6" fill="white" stroke="#8b3a2a"/>
    <text x="330" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">object</text>
    <text x="330" y="242" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#8b3a2a">paris</text>
  </g>

  <!-- Arrow to FFT -->
  <line x1="380" y1="230" x2="415" y2="230" stroke="#1a6b6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FFT bind box -->
  <g>
    <rect x="422" y="208" width="110" height="44" rx="6" fill="#1a6b6e" fill-opacity="0.08" stroke="#1a6b6e"/>
    <text x="477" y="226" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a6b6e" font-weight="700">bind(bind(s,r),o)</text>
    <text x="477" y="243" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">FFT → multiply → IFFT</text>
  </g>

  <!-- Arrow to bucket -->
  <line x1="532" y1="230" x2="567" y2="230" stroke="#1a6b6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Bucket -->
  <g>
    <rect x="574" y="205" width="195" height="50" rx="6" fill="white" stroke="#1a6b6e" stroke-width="1.5"/>
    <text x="671" y="222" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a6b6e" font-weight="700">bucket: alice [3/25]</text>
    <path d="M590,240 Q600,230 610,240 Q620,250 630,240 Q640,230 650,240 Q660,250 670,240 Q680,230 690,240 Q700,250 710,240 Q720,230 730,240 Q740,250 755,240" stroke="#1a6b6e" stroke-width="1.5" fill="none" opacity="0.5"/>
    <text x="671" y="250" text-anchor="middle" font-family="monospace" font-size="8" fill="#9a8e7a">memory += association</text>
  </g>

  <!-- Dual storage note -->
  <g>
    <rect x="785" y="205" width="105" height="50" rx="6" fill="white" stroke="#d8cdb8"/>
    <text x="837" y="223" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a" font-weight="700">symbolic backup</text>
    <text x="837" y="238" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a4e3a">(alice, lives_in,</text>
    <text x="837" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a4e3a"> paris)</text>
  </g>
  <line x1="769" y1="230" x2="783" y2="230" stroke="#d8cdb8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- QUERY — Retrieval Pipeline                   -->
  <!-- ════════════════════════════════════════════ -->
  <text x="30" y="290" font-family="monospace" font-size="10" font-weight="700" fill="#9a8e7a" letter-spacing="2">QUERY</text>

  <!-- Query inputs -->
  <g>
    <rect x="30" y="303" width="100" height="44" rx="6" fill="white" stroke="#1a6b6e"/>
    <text x="80" y="320" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">subject</text>
    <text x="80" y="337" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1a6b6e">alice</text>
  </g>

  <text x="140" y="330" text-anchor="middle" font-family="monospace" font-size="16" fill="#1a6b6e" font-weight="700">⊛</text>

  <g>
    <rect x="155" y="303" width="100" height="44" rx="6" fill="white" stroke="#9a7a3a"/>
    <text x="205" y="320" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">relation</text>
    <text x="205" y="337" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#9a7a3a">lives_in</text>
  </g>

  <!-- Arrow to probe -->
  <line x1="255" y1="325" x2="290" y2="325" stroke="#1a6b6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Probe -->
  <g>
    <rect x="297" y="303" width="90" height="44" rx="6" fill="#1a6b6e" fill-opacity="0.08" stroke="#1a6b6e"/>
    <text x="342" y="321" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a6b6e" font-weight="700">probe</text>
    <text x="342" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">bind(s, r)</text>
  </g>

  <!-- Unbind arrow -->
  <line x1="387" y1="325" x2="422" y2="325" stroke="#1a6b6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Unbind box -->
  <g>
    <rect x="429" y="303" width="105" height="44" rx="6" fill="#1a6b6e" fill-opacity="0.08" stroke="#1a6b6e"/>
    <text x="481" y="321" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a6b6e" font-weight="700">unbind</text>
    <text x="481" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">probe ⊖ memory</text>
  </g>

  <!-- Nearest arrow -->
  <line x1="534" y1="325" x2="569" y2="325" stroke="#1a6b6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Nearest neighbor -->
  <g>
    <rect x="576" y="303" width="130" height="44" rx="6" fill="#1a6b6e" fill-opacity="0.08" stroke="#1a6b6e"/>
    <text x="641" y="321" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a6b6e" font-weight="700">nearest symbol</text>
    <text x="641" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">cosine similarity</text>
  </g>

  <!-- Result arrow -->
  <line x1="706" y1="325" x2="741" y2="325" stroke="#8b3a2a" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- Result -->
  <g>
    <rect x="748" y="303" width="142" height="44" rx="6" fill="#8b3a2a" fill-opacity="0.07" stroke="#8b3a2a"/>
    <text x="819" y="321" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b3a2a">score: 0.30</text>
    <text x="819" y="339" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#8b3a2a">paris</text>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- FORGET — Rebuild Pipeline                    -->
  <!-- ════════════════════════════════════════════ -->
  <text x="30" y="383" font-family="monospace" font-size="10" font-weight="700" fill="#9a8e7a" letter-spacing="2">FORGET</text>

  <!-- Forget input -->
  <g>
    <rect x="30" y="396" width="200" height="36" rx="6" fill="white" stroke="#8b3a2a"/>
    <text x="130" y="419" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b3a2a">forget(alice, lives_in, paris)</text>
  </g>

  <line x1="230" y1="414" x2="268" y2="414" stroke="#8b3a2a" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- Remove triple -->
  <g>
    <rect x="275" y="396" width="130" height="36" rx="6" fill="#8b3a2a" fill-opacity="0.06" stroke="#8b3a2a" stroke-dasharray="4,3"/>
    <text x="340" y="411" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b3a2a" font-weight="700">remove from triples</text>
    <text x="340" y="425" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">splice(idx, 1)</text>
  </g>

  <line x1="405" y1="414" x2="438" y2="414" stroke="#5a7a3a" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Rebuild -->
  <g>
    <rect x="445" y="396" width="175" height="36" rx="6" fill="#5a7a3a" fill-opacity="0.07" stroke="#5a7a3a"/>
    <text x="532" y="411" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a7a3a" font-weight="700">rebuild bucket vector</text>
    <text x="532" y="425" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">re-encode remaining triples</text>
  </g>

  <line x1="620" y1="414" x2="653" y2="414" stroke="#5a7a3a" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Clean result -->
  <g>
    <rect x="660" y="396" width="160" height="36" rx="6" fill="#5a7a3a" fill-opacity="0.07" stroke="#5a7a3a"/>
    <text x="740" y="419" text-anchor="middle" font-family="monospace" font-size="10" fill="#5a7a3a" font-weight="700">clean bucket [2/25]</text>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- AUTO-SHARD — Bucket Chain                    -->
  <!-- ════════════════════════════════════════════ -->
  <text x="30" y="468" font-family="monospace" font-size="10" font-weight="700" fill="#9a8e7a" letter-spacing="2">AUTO-SHARD</text>

  <!-- Bucket chain -->
  <g>
    <rect x="30" y="480" width="120" height="55" rx="6" fill="white" stroke="#1a6b6e" stroke-width="1.5"/>
    <text x="90" y="498" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a6b6e" font-weight="700">alice</text>
    <rect x="42" y="506" width="96" height="6" rx="3" fill="#e8e0cc"/>
    <rect x="42" y="506" width="96" height="6" rx="3" fill="#1a6b6e" opacity="0.7"/>
    <text x="90" y="526" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">25/25 FULL</text>
  </g>

  <text x="160" y="510" font-family="monospace" font-size="14" fill="#1a6b6e">→</text>

  <g>
    <rect x="178" y="480" width="120" height="55" rx="6" fill="white" stroke="#1a6b6e"/>
    <text x="238" y="498" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a6b6e" font-weight="700">alice#1</text>
    <rect x="190" y="506" width="96" height="6" rx="3" fill="#e8e0cc"/>
    <rect x="190" y="506" width="46" height="6" rx="3" fill="#1a6b6e" opacity="0.5"/>
    <text x="238" y="526" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">12/25</text>
  </g>

  <g>
    <rect x="340" y="480" width="120" height="55" rx="6" fill="white" stroke="#9a7a3a"/>
    <text x="400" y="498" text-anchor="middle" font-family="monospace" font-size="10" fill="#9a7a3a" font-weight="700">bob</text>
    <rect x="352" y="506" width="96" height="6" rx="3" fill="#e8e0cc"/>
    <rect x="352" y="506" width="31" height="6" rx="3" fill="#9a7a3a" opacity="0.5"/>
    <text x="400" y="526" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">8/25</text>
  </g>

  <g>
    <rect x="502" y="480" width="120" height="55" rx="6" fill="white" stroke="#8b3a2a"/>
    <text x="562" y="498" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b3a2a" font-weight="700">server</text>
    <rect x="514" y="506" width="96" height="6" rx="3" fill="#e8e0cc"/>
    <rect x="514" y="506" width="12" height="6" rx="3" fill="#8b3a2a" opacity="0.5"/>
    <text x="562" y="526" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a8e7a">3/25</text>
  </g>

  <text x="635" y="512" font-family="Georgia, serif" font-size="14" fill="#9a8e7a">...</text>

  <!-- Shard note -->
  <g>
    <rect x="665" y="480" width="225" height="55" rx="6" fill="white" stroke="#d8cdb8"/>
    <text x="777" y="499" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a6b6e" font-weight="700">MAX_BUCKET_SIZE = 25</text>
    <text x="777" y="514" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5a4e3a">100% accuracy per bucket</text>
    <text x="777" y="528" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5a4e3a">Unlimited total via auto-sharding</text>
  </g>

  <!-- Footer -->
  <text x="460" y="552" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#9a8e7a">hrr-memory v0.2 · zero dependencies · Float32 · FFT-based circular convolution · Plate (1994)</text>
</svg>
